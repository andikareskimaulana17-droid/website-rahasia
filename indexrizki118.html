<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenangan Masa Lalu</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e3a8a);
  color: white;
}

/* LOGIN */
#loginPage {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  animation: fadeIn 1s ease;
}

input {
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  width: 200px;
}

button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0ea5e9;
  transform: scale(1.05);
}

/* WEBSITE */
#mainPage {
  display: none;
  animation: fadeIn 1s ease;
}

header {
  text-align: center;
  padding: 40px;
  background: rgba(0,0,0,0.5);
}

.section {
  padding: 40px;
  text-align: center;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  margin: 20px auto;
  padding: 20px;
  border-radius: 15px;
  width: 80%;
  transition: 0.3s;

  opacity: 0;
  transform: translateY(30px);
  animation: muncul 1s ease forwards;
}

.card:nth-child(1) { animation-delay: 0.2s; }
.card:nth-child(2) { animation-delay: 0.4s; }
.card:nth-child(3) { animation-delay: 0.6s; }

.card:hover {
  transform: scale(1.05);
  background: rgba(255,255,255,0.2);
}

/* GALERI */
.gallery {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.gallery img {
  width: 200px;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.5s;
}

.gallery img:hover {
  transform: scale(1.2) rotate(2deg);
}

/* VIDEO */
.video-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

video {
  width: 300px;
  border-radius: 10px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: rgba(0,0,0,0.6);
}

/* PLAYER */
.music-player {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ANIMASI */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes muncul {
  to { opacity: 1; transform: translateY(0);}
}

.fade-out {
  animation: hilang 0.8s forwards;
}

@keyframes hilang {
  to { opacity: 0; transform: scale(0.9);}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h2>🔐 silahkan login dulu</h2>
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button onclick="login()">Masuk</button>
  </div>
</div>

<!-- WEBSITE -->
<div id="mainPage">

<header>
  <h1>✨ Kenangan Masa Lalu</h1>
</header>

<div class="section">
  <div class="card"><p>ini kisah  saya</p></div>

  <Code
div class="section">
  <div class="card">
    <h2>📸 Galeri</h2>
    <div class="gallery">
      <img src="kenangan1.jpeg" alt="Kenangan 1">
      <img src="kenangan2.jpeg" alt="Kenangan 2">
      <img src="kenagan3.jpeg" alt="Kenangan 3">
    </div>
  </div>
</div>

</div>
<div class="section">
  <div class="card">
    <h2>🎥 Video</h2>
    <div class="video-container">
      <video controls><source src="kenangan1.mp4" type="video/mp4"></video>
      <video controls><source src="kenangan2.mp4" type="video/mp4"></video>
      <video controls><source src="kenangan3.mp4" type="video/mp4"></video>
      <video controls><source src="kenangan4.mp4" type="video/mp4"></video>
      <video controls><source src="kenangan5.mp4" type="video/mp4"></video>
      <video controls><source src="kengan6.mp4" type="video/mp4"></video>
      <video controls><source src="kengan7.mp4" type="video/mp4"></video>
      <video controls><source src="kengan8.mp4" type="video/mp4"></video>
    </div>
  </div>
</div>

<footer>
  <p>© 2026 andika rizki</p>
</footer>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="Masa ini, Nanti, dan Masa Indah Lainnya.mp3" type="audio/mpeg">
</audio>

<!-- PLAYER -->
<div class="music-player">
  <button onclick="playMusic()">▶️</button>
  <button onclick="pauseMusic()">⏸️</button>
  <input type="range" min="0" max="1" step="0.1" onchange="setVolume(this.value)">
</div>

<script>
// ENTER LOGIN
document.addEventListener("DOMContentLoaded", function () {
  document.getElementById("password").addEventListener("keypress", e => {
    if (e.key === "Enter") login();
  });
});

// LOGIN
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (user === "dika" && pass === "andika988178") {
    document.getElementById("loginPage").classList.add("fade-out");

    setTimeout(() => {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("mainPage").style.display = "block";
      document.getElementById("bgMusic").play();
    }, 800);

  } else {
    alert("❌ salah!");
  }
}

// MUSIC CONTROL
function playMusic() {
  document.getElementById("bgMusic").play();
}

function pauseMusic() {
  document.getElementById("bgMusic").pause();
}

function setVolume(v) {
  document.getElementById("bgMusic").volume = v;
}
</script>

</body>
</html>
